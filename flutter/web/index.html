<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="جرس المسابقة">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="جرس المسابقة">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>جرس المسابقة</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ── صوت الجرس عبر Web Audio API ──────────────────────────
    // يُستدعى من Flutter عبر js.context.callMethod('playBuzzSound', [])
    function playBuzzSound() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var gain = ctx.createGain();
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        gain.connect(ctx.destination);

        // نغمة الجرس: موجتان مدمجتان
        [[880, 'square'], [1320, 'sine']].forEach(function(p) {
          var osc = ctx.createOscillator();
          osc.type = p[1];
          osc.frequency.setValueAtTime(p[0], ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(p[0] * 0.25, ctx.currentTime + 0.35);
          osc.connect(gain);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        });
      } catch(e) { console.warn('Audio error:', e); }
    }

    // تسجيل الـ Service Worker لدعم PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
